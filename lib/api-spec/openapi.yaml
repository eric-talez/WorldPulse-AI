openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: FutureMap AI API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: countries
  - name: issues
  - name: jobs
  - name: forum
  - name: dashboard
  - name: planets
  - name: forecasts
  - name: cities
  - name: auth
  - name: payments
  - name: admin
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /countries:
    get:
      operationId: listCountries
      tags: [countries]
      summary: List all tracked countries with risk scores and coordinates
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Country"

  /countries/{code}:
    get:
      operationId: getCountry
      tags: [countries]
      summary: Country detail with top risk and growth jobs
      parameters:
        - in: path
          name: code
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CountryDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /countries/{code}/cities:
    get:
      operationId: listCountryCities
      tags: [countries, cities]
      summary: List curated cities for a given country
      parameters:
        - in: path
          name: code
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/City"

  /cities/{id}/issues:
    get:
      operationId: listCityIssues
      tags: [cities, issues]
      summary: Issues attached to a specific city
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Issue"

  /issues/{id}:
    get:
      operationId: getIssue
      tags: [issues]
      summary: Single issue / signal detail
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /issues:
    get:
      operationId: listIssues
      tags: [issues]
      summary: Global signal stream of issues, filterable by planet, category and country
      parameters:
        - in: query
          name: planet
          required: false
          schema:
            $ref: "#/components/schemas/Planet"
        - in: query
          name: category
          required: false
          schema:
            type: string
            enum: [news, conflict, disease, politics, economy, culture, ai_jobs, tech, natural_disaster, cyber, terror, climate, space, lunar_base, mars_habitat]
        - in: query
          name: country
          required: false
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 30 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Issue"

  /issues/summary:
    get:
      operationId: getIssueSummary
      tags: [issues, dashboard]
      summary: Counts of issues per category for the global signal stream
      parameters:
        - in: query
          name: planet
          required: false
          schema:
            $ref: "#/components/schemas/Planet"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryCount"

  /jobs/analyze:
    post:
      operationId: analyzeJob
      tags: [jobs]
      summary: Generate an AI future report for a specified job and country
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobAnalyzeInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobReport"

  /jobs/reports/recent:
    get:
      operationId: listRecentJobReports
      tags: [jobs, dashboard]
      summary: Recent job future reports generated across all users
      parameters:
        - in: query
          name: planet
          required: false
          schema:
            $ref: "#/components/schemas/Planet"
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 50, default: 8 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobReport"

  /forum/posts:
    get:
      operationId: listForumPosts
      tags: [forum]
      summary: List forum posts, filterable by country
      parameters:
        - in: query
          name: country
          required: false
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ForumPost"
    post:
      operationId: createForumPost
      tags: [forum]
      summary: Create a new forum post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForumPostInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForumPost"

  /forum/posts/{postId}/replies:
    get:
      operationId: listForumReplies
      tags: [forum]
      summary: List replies for a forum post (flat list, ordered oldest first)
      parameters:
        - in: path
          name: postId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ForumReply"
    post:
      operationId: createForumReply
      tags: [forum]
      summary: Add a reply (or nested reply) to a forum post
      parameters:
        - in: path
          name: postId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForumReplyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForumReply"

  /forum/banners:
    get:
      operationId: listCountryBanners
      tags: [forum]
      summary: List active banners for a country (or all if no country given)
      parameters:
        - in: query
          name: country
          required: false
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CountryBanner"

  /admin/country-banners:
    get:
      operationId: adminListCountryBanners
      tags: [forum]
      summary: Admin — list all country banners (active and inactive)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CountryBanner"
    post:
      operationId: adminCreateCountryBanner
      tags: [forum]
      summary: Admin — create a new country banner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CountryBannerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CountryBanner"

  /admin/country-banners/{id}:
    patch:
      operationId: adminUpdateCountryBanner
      tags: [forum]
      summary: Admin — update a country banner
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CountryBannerUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CountryBanner"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: adminDeleteCountryBanner
      tags: [forum]
      summary: Admin — delete a country banner
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /planets:
    get:
      operationId: listPlanets
      tags: [planets]
      summary: Available planets with metadata, locations and signal categories
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlanetInfo"

  /planets/{planet}/locations/{code}:
    get:
      operationId: getPlanetLocation
      tags: [planets]
      summary: Detail for a non-Earth planet location with related signals
      parameters:
        - in: path
          name: planet
          required: true
          schema:
            $ref: "#/components/schemas/Planet"
        - in: path
          name: code
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanetLocationDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /forecasts:
    get:
      operationId: listForecasts
      tags: [forecasts]
      summary: Heuristic predicted-news signals derived from recent issues
      parameters:
        - in: query
          name: planet
          required: false
          schema:
            $ref: "#/components/schemas/Planet"
        - in: query
          name: countryCode
          required: false
          schema: { type: string }
        - in: query
          name: category
          required: false
          schema:
            type: string
            enum: [news, conflict, disease, politics, economy, culture, ai_jobs, tech, natural_disaster, cyber, terror, climate, space, lunar_base, mars_habitat]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Forecast"

  /forecasts/accuracy:
    get:
      operationId: getForecastAccuracy
      tags: [forecasts]
      summary: Track-record accuracy of past forecasts whose horizon has elapsed
      parameters:
        - in: query
          name: planet
          required: false
          schema:
            $ref: "#/components/schemas/Planet"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForecastAccuracy"

  /auth/nonce:
    post:
      operationId: createAuthNonce
      tags: [auth]
      summary: Issue a nonce for SIWE wallet sign-in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthNonceInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthNonce"

  /auth/verify:
    post:
      operationId: verifyAuthSignature
      tags: [auth]
      summary: Verify a SIWE signed message and create a session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthVerifyInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          description: Invalid signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Clear the active session
      responses:
        "204":
          description: No Content

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Return the current logged-in user (or null)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"

  /payments/orders:
    post:
      operationId: createPaypalOrder
      tags: [payments]
      summary: Create a one-time PayPal order for a plan upgrade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOrderResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/orders/{orderId}/capture:
    post:
      operationId: capturePaypalOrder
      tags: [payments]
      summary: Capture an approved one-time PayPal order
      parameters:
        - in: path
          name: orderId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/subscriptions:
    post:
      operationId: createPaypalSubscription
      tags: [payments]
      summary: Create a recurring PayPal subscription for a plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubscriptionInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSubscriptionResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/subscriptions/{subscriptionId}/activate:
    post:
      operationId: activatePaypalSubscription
      tags: [payments]
      summary: Mark an approved PayPal subscription as active and upgrade the user
      parameters:
        - in: path
          name: subscriptionId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"

  /payments/subscriptions/{subscriptionId}/cancel:
    post:
      operationId: cancelPaypalSubscription
      tags: [payments]
      summary: Cancel an active PayPal subscription
      parameters:
        - in: path
          name: subscriptionId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"

  /payments/config:
    get:
      operationId: getPaymentsConfig
      tags: [payments]
      summary: Return the public PayPal config the frontend needs (client ID, plan IDs, env)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentsConfig"

  /payments/webhook:
    post:
      operationId: paypalWebhook
      tags: [payments]
      summary: Receive PayPal webhook events for subscription/payment lifecycle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaypalWebhookEvent"
      responses:
        "200":
          description: Acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookAck"

  /payments/stripe/checkout:
    post:
      operationId: createStripeCheckout
      tags: [payments]
      summary: Create a Stripe Checkout session (card / Apple Pay / Google Pay)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StripeCheckoutInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeCheckoutSession"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Stripe not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/stripe/sessions/{sessionId}/confirm:
    post:
      operationId: confirmStripeCheckout
      tags: [payments]
      summary: Server-verify a Stripe Checkout session result and update the user
      parameters:
        - in: path
          name: sessionId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/auth/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Log in as admin with email + password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"
        "401":
          description: Bad credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/auth/logout:
    post:
      operationId: adminLogout
      tags: [admin]
      summary: Clear the admin session cookie
      responses:
        "204":
          description: No Content

  /admin/auth/me:
    get:
      operationId: adminMe
      tags: [admin]
      summary: Return current admin session (or null)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSessionResponse"

  /admin/stats/users:
    get:
      operationId: adminUserStats
      tags: [admin]
      summary: User signups, deactivations and a daily time series
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserStats"

  /admin/stats/forum:
    get:
      operationId: adminForumStats
      tags: [admin]
      summary: Forum totals, per-country ranking and hot posts
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminForumStats"

  /admin/stats/countries:
    get:
      operationId: adminCountryStats
      tags: [admin]
      summary: Per-country activity table (posts, users, issues)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminCountryRow"

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: Paginated list of users with optional search
      parameters:
        - in: query
          name: search
          required: false
          schema: { type: string }
        - in: query
          name: page
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: pageSize
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserPage"

  /admin/users/{walletAddress}:
    get:
      operationId: adminGetUser
      tags: [admin]
      summary: User profile + their forum posts and replies
      parameters:
        - in: path
          name: walletAddress
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{walletAddress}/suspend:
    post:
      operationId: adminSuspendUser
      tags: [admin]
      summary: Suspend (deactivate) a user, optionally with a reason
      parameters:
        - in: path
          name: walletAddress
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminSuspendUserInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{walletAddress}/reactivate:
    post:
      operationId: adminReactivateUser
      tags: [admin]
      summary: Reactivate a previously suspended user
      parameters:
        - in: path
          name: walletAddress
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/forum/posts:
    get:
      operationId: adminListForumPosts
      tags: [admin]
      summary: Admin — list forum posts with filters
      parameters:
        - in: query
          name: country
          required: false
          schema: { type: string }
        - in: query
          name: author
          required: false
          schema: { type: string }
        - in: query
          name: from
          required: false
          description: ISO 8601 date or date-time
          schema: { type: string }
        - in: query
          name: to
          required: false
          description: ISO 8601 date or date-time
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminForumPost"

  /admin/forum/posts/{id}:
    get:
      operationId: adminGetForumPost
      tags: [admin]
      summary: Admin — full post + comments
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminForumPostDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: adminDeleteForumPost
      tags: [admin]
      summary: Admin — soft-delete a forum post
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /admin/forum/replies/{id}:
    delete:
      operationId: adminDeleteForumReply
      tags: [admin]
      summary: Admin — soft-delete a forum reply
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Top-level platform stats — total countries, issues, jobs analyzed, forum posts
      parameters:
        - in: query
          name: planet
          required: false
          schema:
            $ref: "#/components/schemas/Planet"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    ErrorResponse:
      type: object
