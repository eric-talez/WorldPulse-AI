openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: FutureMap AI API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: countries
  - name: issues
  - name: jobs
  - name: forum
  - name: dashboard
  - name: auth
  - name: payments
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /countries:
    get:
      operationId: listCountries
      tags: [countries]
      summary: List all tracked countries with risk scores and coordinates
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Country"

  /countries/{code}:
    get:
      operationId: getCountry
      tags: [countries]
      summary: Country detail with top risk and growth jobs
      parameters:
        - in: path
          name: code
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CountryDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /issues:
    get:
      operationId: listIssues
      tags: [issues]
      summary: Global signal stream of issues, filterable by category and country
      parameters:
        - in: query
          name: category
          required: false
          schema:
            type: string
            enum: [news, conflict, disease, politics, economy, culture, ai_jobs, tech, natural_disaster, cyber, terror, climate]
        - in: query
          name: country
          required: false
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 30 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Issue"

  /issues/summary:
    get:
      operationId: getIssueSummary
      tags: [issues, dashboard]
      summary: Counts of issues per category for the global signal stream
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryCount"

  /jobs/analyze:
    post:
      operationId: analyzeJob
      tags: [jobs]
      summary: Generate an AI future report for a specified job and country
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobAnalyzeInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobReport"

  /jobs/reports/recent:
    get:
      operationId: listRecentJobReports
      tags: [jobs, dashboard]
      summary: Recent job future reports generated across all users
      parameters:
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 50, default: 8 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobReport"

  /forum/posts:
    get:
      operationId: listForumPosts
      tags: [forum]
      summary: List forum posts, filterable by country
      parameters:
        - in: query
          name: country
          required: false
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ForumPost"
    post:
      operationId: createForumPost
      tags: [forum]
      summary: Create a new forum post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForumPostInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForumPost"

  /auth/nonce:
    post:
      operationId: createAuthNonce
      tags: [auth]
      summary: Issue a nonce for SIWE wallet sign-in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthNonceInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthNonce"

  /auth/verify:
    post:
      operationId: verifyAuthSignature
      tags: [auth]
      summary: Verify a SIWE signed message and create a session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthVerifyInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          description: Invalid signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Clear the active session
      responses:
        "204":
          description: No Content

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Return the current logged-in user (or null)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"

  /payments/orders:
    post:
      operationId: createPaypalOrder
      tags: [payments]
      summary: Create a one-time PayPal order for a plan upgrade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOrderResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/orders/{orderId}/capture:
    post:
      operationId: capturePaypalOrder
      tags: [payments]
      summary: Capture an approved one-time PayPal order
      parameters:
        - in: path
          name: orderId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/subscriptions:
    post:
      operationId: createPaypalSubscription
      tags: [payments]
      summary: Create a recurring PayPal subscription for a plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubscriptionInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSubscriptionResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/subscriptions/{subscriptionId}/activate:
    post:
      operationId: activatePaypalSubscription
      tags: [payments]
      summary: Mark an approved PayPal subscription as active and upgrade the user
      parameters:
        - in: path
          name: subscriptionId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"

  /payments/subscriptions/{subscriptionId}/cancel:
    post:
      operationId: cancelPaypalSubscription
      tags: [payments]
      summary: Cancel an active PayPal subscription
      parameters:
        - in: path
          name: subscriptionId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"

  /payments/config:
    get:
      operationId: getPaymentsConfig
      tags: [payments]
      summary: Return the public PayPal config the frontend needs (client ID, plan IDs, env)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentsConfig"

  /payments/webhook:
    post:
      operationId: paypalWebhook
      tags: [payments]
      summary: Receive PayPal webhook events for subscription/payment lifecycle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaypalWebhookEvent"
      responses:
        "200":
          description: Acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookAck"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Top-level platform stats — total countries, issues, jobs analyzed, forum posts
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error: { type: string }
      required: [error]

    Country:
      type: object
      required: [code, name, nameKo, flag, latitude, longitude, riskScore, region]
      properties:
        code: { type: string, description: "ISO 3166-1 alpha-2 code" }
        name: { type: string }
        nameKo: { type: string }
        flag: { type: string, description: "Emoji flag" }
        latitude: { type: number }
        longitude: { type: number }
        riskScore: { type: integer, minimum: 0, maximum: 100 }
        region: { type: string }

    JobInsight:
      type: object
      required: [title, score]
      properties:
        title: { type: string }
        score: { type: integer, minimum: 0, maximum: 200 }

    CountryDetail:
      type: object
      required: [country, summary, topRisks, topGrowth]
      properties:
        country: { $ref: "#/components/schemas/Country" }
        summary: { type: string }
        topRisks:
          type: array
          items: { $ref: "#/components/schemas/JobInsight" }
        topGrowth:
          type: array
          items: { $ref: "#/components/schemas/JobInsight" }

    Issue:
      type: object
      required: [id, countryCode, countryFlag, category, headline, publishedAt]
      properties:
        id: { type: string }
        countryCode: { type: string }
        countryFlag: { type: string }
        category:
          type: string
          enum: [news, conflict, disease, politics, economy, culture, ai_jobs, tech, natural_disaster, cyber, terror, climate]
        headline: { type: string }
        body: { type: ["string", "null"] }
        sourceUrl: { type: ["string", "null"] }
        publishedAt: { type: string, format: date-time }

    CategoryCount:
      type: object
      required: [category, count]
      properties:
        category:
          type: string
          enum: [news, conflict, disease, politics, economy, culture, ai_jobs, tech, natural_disaster, cyber, terror, climate]
        count: { type: integer, minimum: 0 }

    JobAnalyzeInput:
      type: object
      required: [jobName, countryCode]
      properties:
        jobName: { type: string, minLength: 1 }
        countryCode: { type: string, minLength: 2 }

    JobReport:
      type: object
      required:
        - id
        - jobName
        - countryCode
        - countryName
        - automationRisk
        - growthScore
        - summary
        - automatedTasks
        - humanStrengths
        - futureChanges
        - recommendedSkills
        - countryOpportunities
        - createdAt
      properties:
        id: { type: string }
        jobName: { type: string }
        countryCode: { type: string }
        countryName: { type: string }
        automationRisk: { type: integer, minimum: 0, maximum: 100 }
        growthScore: { type: integer, minimum: 0, maximum: 100 }
        summary: { type: string }
        automatedTasks:
          type: array
          items: { type: string }
        humanStrengths:
          type: array
          items: { type: string }
        futureChanges:
          type: array
          items: { type: string }
        recommendedSkills:
          type: array
          items: { type: string }
        countryOpportunities:
          type: array
          items: { type: string }
        createdAt: { type: string, format: date-time }

    ForumPost:
      type: object
      required: [id, countryCode, author, title, replyCount, createdAt]
      properties:
        id: { type: string }
        countryCode: { type: string }
        author: { type: string }
        title: { type: string }
        body: { type: ["string", "null"] }
        replyCount: { type: integer, minimum: 0 }
        createdAt: { type: string, format: date-time }

    ForumPostInput:
      type: object
      required: [countryCode, author, title]
      properties:
        countryCode: { type: string, minLength: 2 }
        author: { type: string, minLength: 1 }
        title: { type: string, minLength: 1 }
        body: { type: string }

    AuthNonceInput:
      type: object
      required: [walletAddress]
      properties:
        walletAddress: { type: string, minLength: 42, maxLength: 42 }

    AuthNonce:
      type: object
      required: [nonce, message]
      properties:
        nonce: { type: string }
        message: { type: string, description: "Full SIWE message the wallet must sign" }

    AuthVerifyInput:
      type: object
      required: [message, signature]
      properties:
        message: { type: string }
        signature: { type: string }

    UserTier:
      type: string
      enum: [free, pro, enterprise]

    CurrentUser:
      type: object
      required: [walletAddress, tier, createdAt, lastLoginAt]
      properties:
        walletAddress: { type: string }
        tier: { $ref: "#/components/schemas/UserTier" }
        createdAt: { type: string, format: date-time }
        lastLoginAt: { type: string, format: date-time }
        activeSubscription:
          oneOf:
            - $ref: "#/components/schemas/ActiveSubscription"
            - type: "null"

    ActiveSubscription:
      type: object
      required: [paypalSubscriptionId, plan, status]
      properties:
        paypalSubscriptionId: { type: string }
        plan: { $ref: "#/components/schemas/UserTier" }
        status: { type: string }
        nextBillingAt:
          oneOf:
            - { type: string, format: date-time }
            - { type: "null" }

    CurrentUserResponse:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: "#/components/schemas/CurrentUser"
            - type: "null"

    PlanId:
      type: string
      enum: [pro, enterprise]

    CreateOrderInput:
      type: object
      required: [plan]
      properties:
        plan: { $ref: "#/components/schemas/PlanId" }

    CreateOrderResponse:
      type: object
      required: [orderId]
      properties:
        orderId: { type: string }

    CreateSubscriptionInput:
      type: object
      required: [plan]
      properties:
        plan: { $ref: "#/components/schemas/PlanId" }

    CreateSubscriptionResponse:
      type: object
      required: [subscriptionId, approveUrl]
      properties:
        subscriptionId: { type: string }
        approveUrl: { type: string }

    PaymentsConfig:
      type: object
      required: [clientId, env, plans]
      properties:
        clientId:
          oneOf:
            - { type: string }
            - { type: "null" }
        env:
          type: string
          enum: [sandbox, live]
        plans:
          type: object
          required: [pro, enterprise]
          properties:
            pro: { $ref: "#/components/schemas/PlanInfo" }
            enterprise: { $ref: "#/components/schemas/PlanInfo" }

    PaypalWebhookEvent:
      type: object
      required: [id, event_type]
      properties:
        id: { type: string }
        event_type: { type: string }
        resource:
          type: object
          additionalProperties: true

    WebhookAck:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }

    PlanInfo:
      type: object
      required: [priceUsd, hasSubscriptionPlan]
      properties:
        priceUsd: { type: integer }
        hasSubscriptionPlan: { type: boolean }

    DashboardStats:
      type: object
      required: [countriesTracked, issuesToday, jobReportsGenerated, forumPosts, topCategory]
      properties:
        countriesTracked: { type: integer }
        issuesToday: { type: integer }
        jobReportsGenerated: { type: integer }
        forumPosts: { type: integer }
        topCategory: { type: string }
